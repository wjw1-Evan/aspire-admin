name: Build Aspire Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set repository name (lowercase)
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        run: |
          curl -sSL https://aspire.dev/install.sh | bash
          echo "$HOME/.aspire/bin" >> $GITHUB_PATH
          aspire --version

      - name: Build & Push all images
        run: aspire do push
        env:
          Parameters__registry_endpoint: ${{ env.REGISTRY }}
          Parameters__registry_repository: ${{ env.REPO_LOWER }}

      - name: Publish Docker Compose artifacts
        run: |
          aspire publish \
            --project Platform.AppHost/Platform.AppHost.csproj \
            --output-path ./aspire-output

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aspire-deployment-files
          path: ./aspire-output/
          retention-days: 30
          include-hidden-files: true

      - name: Print Build Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images built and pushed via \`aspire do push\`" >> $GITHUB_STEP_SUMMARY
