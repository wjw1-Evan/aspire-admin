name: Integration Tests

on:
  push:
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release
      - name: Run Integration Tests
        run: dotnet test Platform.AppHost.Tests/Platform.AppHost.Tests.csproj --logger "console;verbosity=detailed" --filter "Category=Integration"
