name: Unit Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release
      - name: Run Unit Tests
        run: dotnet test Platform.AppHost.Tests/Platform.AppHost.Tests.csproj --filter "Category=Unit" --logger "console;verbosity=detailed"
